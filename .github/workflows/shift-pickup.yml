name: WIW Shift Pickup Automation

on:
  schedule:
    # Poll every 60 minutes. Times are UTC.
    - cron: '0 * * * *'
  workflow_dispatch:  # manual trigger from the Actions tab for debugging

jobs:
  process-shift-pickups:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Process shift pickups
        env:
          WIW_API_KEY:        ${{ secrets.WIW_API_KEY }}
          WIW_EMAIL:          ${{ secrets.WIW_EMAIL }}
          WIW_PASSWORD:       ${{ secrets.WIW_PASSWORD }}
          ASANA_ACCESS_TOKEN: ${{ secrets.ASANA_ACCESS_TOKEN }}
          ASANA_PROJECT_GID:  ${{ secrets.ASANA_PROJECT_GID }}
        run: node src/handler.js
